<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinesisch-Trainer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Chinesisch-Trainer</h1>
<div id="setup">
<p>Modus wählen:</p>
<button onclick="start(1)">Zeichen → Bedeutung</button>
<button onclick="start(2)">Bedeutung → Zeichen</button>
</div>
<div id="trainer" class="hidden">
<div id="counter"></div>
<div class="card-layout">
<div class="panel"><h2>Frage</h2><div id="card"></div></div>
<div id="answerPanel" class="panel hidden"><h2>Lösung</h2><div id="answer"></div></div>
</div>
<div class="controls">
<button id="showBtn" onclick="showAnswer()">Lösung anzeigen</button>
<div id="buttons" class="hidden">
<button onclick="answerKnown(true)">Gewusst ✓</button>
<button onclick="answerKnown(false)">Nicht gewusst ✗</button>
</div>
</div>
</div>
<div id="finished" class="hidden"><h2>Fertig!</h2><button onclick="location.reload()">Neu starten</button></div>
</div>
<script src="zeichen.js"></script>
<script src="script.js"></script>
</body>
</html>
